<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link rel="stylesheet" href="signpage.css">
</head>
<body>
    <div class="container">
        <a href="firstpage.html" class="back-button">← Back</a>
        <h1>Create an <br> Account</h1>
        <img src="img/blindassist.png" alt="Signup Illustration" class="signup-image">

        <form action="dashboard.html" method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <div class="checkbox-container">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="#">terms and conditions</a></label>
            </div>

            <button type="submit" class="signup-button">SIGN UP</button>
        </form>
    </div>
    <script type="module">
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      
        const auth = getAuth();
      
        document.querySelector("form").addEventListener("submit", function(event) {
          event.preventDefault(); // Prevent form from refreshing the page
      
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
      
          createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
              alert("Signup successful! You can now log in.");
              window.location.href = "loginpage.html"; // Redirect to login
            })
            .catch((error) => {
              alert(error.message); // Show error message
            });
        });
      </script>
      
</body>
</html>
