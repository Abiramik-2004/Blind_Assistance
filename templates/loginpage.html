<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blind Assistant</title>
    <link rel="stylesheet" href="loginpage.css">
    <script type="module" src="firebase-config.js"></script>

</head>
<body>
    <div class="container">
        <a href="firstpage.html" class="back-btn">← Back</a>
        <h1>Welcome Back!</h1>
        <img src="img/blindassist.png" alt="Blind assistance illustration" class="illustration">
        
        <form>
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <button type="submit" class="sign-in-btn">SIGN IN</button>

            <a href="forgetpass.html" class="forgot-password">Forgot Password?</a>
        </form>
    </div>
    <script type="module">
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      
        const auth = getAuth();
      
        document.querySelector("form").addEventListener("submit", function(event) {
          event.preventDefault(); // Prevent form from refreshing
      
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
      
          signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
              alert("Login successful!");
              window.location.href = "dashboard.html"; // Redirect to dashboard
            })
            .catch((error) => {
              alert(error.message); // Show error message
            });
        });
      </script>
      
</body>
</html>
